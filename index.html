<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadows Car Wash</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
--bg:#0a0a0f;
--surface:#13131c;
--card:#1a1a27;
--border:#2a2a40;
--accent:#00d4ff;
--accent2:#0099cc;
--gold:#f0c040;
--text:#e8e8f0;
--muted:#6b6b88;
--success:#00e676;
--danger:#ff5252;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:"DM Sans",sans-serif;
background:var(--bg);
color:var(--text);
min-height:100vh;
}

.wrap{
max-width:680px;
margin:auto;
padding:36px 18px 80px;
}

.header{text-align:center;margin-bottom:32px;}

#logo{
width:140px;
height:140px;
border-radius:50%;
margin-bottom:8px;
}

.tagline{
font-size:11px;
color:var(--muted);
letter-spacing:3px;
text-transform:uppercase;
}

.tabs{
display:flex;
gap:6px;
background:var(--surface);
border:1px solid var(--border);
border-radius:14px;
padding:5px;
margin-bottom:20px;
}

.tab{
flex:1;
padding:10px;
border:none;
border-radius:10px;
font-size:13px;
font-weight:600;
cursor:pointer;
color:var(--muted);
background:transparent;
}

.tab.active{
background:var(--card);
color:var(--accent);
}

.panel{display:none;}
.panel.active{display:block;}

.card{
background:var(--surface);
border:1px solid var(--border);
border-radius:18px;
padding:24px;
margin-bottom:16px;
}

.ctitle{
font-family:"Bebas Neue";
font-size:18px;
letter-spacing:2px;
color:var(--accent);
margin-bottom:14px;
}

.field{margin-bottom:13px;}

.field label{
font-size:11px;
color:var(--muted);
display:block;
margin-bottom:5px;
}

.field input{
width:100%;
background:var(--card);
border:1px solid var(--border);
border-radius:9px;
padding:11px;
color:var(--text);
}

.btn{
width:100%;
padding:13px;
border-radius:11px;
border:none;
font-size:14px;
font-weight:700;
cursor:pointer;
margin-top:5px;
}

.bp{
background:linear-gradient(135deg,var(--accent),var(--accent2));
color:#000;
}

.bg{
background:linear-gradient(135deg,var(--gold),#d4900a);
color:#000;
}

.bt{
background:transparent;
border:1px solid var(--border);
color:var(--muted);
}
</style>
</head>

<body>

<div class="wrap">

<div class="header">
<img id="logo" alt="Shadows Car Wash">
<p class="tagline">Membership Portal</p>
</div>

<div class="tabs">
<button class="tab active" id="t0">🔍 Check Membership</button>
<button class="tab" id="t1" onclick="return checkStaffAccess()">🔧 Staff Panel</button>
</div>

<!-- CUSTOMER PANEL -->

<div class="panel active" id="p0">

<div class="card">
<div class="ctitle">Check Your Wash Count</div>

<div class="field">
<label>Vehicle Number</label>
<input id="cv" type="text" placeholder="TN01AB1234">
</div>

<button class="btn bp" id="cbtn">Check Membership</button>

</div>

<div id="cres"></div>

</div>

<!-- STAFF PANEL -->

<div class="panel" id="p1">

<div class="card">

<div class="ctitle">Record a Wash</div>

<div class="field">
<label>Vehicle Number</label>
<input id="av" type="text">
</div>

<button class="btn bp" id="awbtn">
Add Wash + Save to Sheet
</button>

</div>

<div class="card">

<div class="ctitle">Register New Customer</div>

<div class="field">
<label>Full Name</label>
<input id="an" type="text">
</div>

<div class="field">
<label>Vehicle Number</label>
<input id="anv" type="text">
</div>

<div class="field">
<label>Phone</label>
<input id="aph" type="text">
</div>

<button class="btn bg" id="arbtn">
Register & Record 1st Wash
</button>

</div>

</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="app.js"></script>

<script>

function checkStaffAccess(){

let pass = prompt("Enter Staff Password");

if(pass === "shadow123"){
return true;
}

alert("Access Denied");
return false;

}

</script>

</body>
</html>
