<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Shadows Car Wash</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

.primary{
background:#06b6d4;
color:black;
}

.gold{
background:#f59e0b;
color:black;
}

input{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:10px;
border-radius:6px;
border:none;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<div class="container">

<h2>Shadows Car Wash</h2>

<button onclick="showCustomer()">Check Membership</button> <button onclick="staffLogin()">Staff Panel</button>

<!-- CUSTOMER PANEL -->

<div id="customerPanel" class="card">

<h3>Check Membership</h3>

<label>Vehicle Number</label> <input id="cv" placeholder="Enter Vehicle Number">

<button class="primary" onclick="checkMembership()">
Check Membership
</button>

<div id="result"></div>

</div>

<!-- STAFF PANEL -->

<div id="staffPanel" class="hidden">

<div class="card">

<h3>Add Wash</h3>

<input id="av" placeholder="Vehicle Number">

<button class="primary" onclick="addWash()">
Add Wash
</button>

</div>

<div class="card">

<h3>Register Customer</h3>

<input id="name" placeholder="Customer Name">
<input id="vehicle" placeholder="Vehicle Number">
<input id="phone" placeholder="Phone Number">

<button class="gold" onclick="registerCustomer()">
Register Customer
</button>

</div>

</div>

</div>

<script src="app.js"></script>

<script>

function showCustomer(){
document.getElementById("staffPanel").classList.add("hidden")
}

function staffLogin(){

let password = prompt("Enter Staff Password")

if(password === "shadow123"){
document.getElementById("staffPanel").classList.remove("hidden")
}else{
alert("Access Denied")
}

}

</script>

</body>
</html>
